name: Build TIPA for TrollStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Install Theos
      run: |
        brew install ldid dpkg
        sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
        echo "THEOS=/opt/theos" >> $GITHUB_ENV
        echo "/opt/theos/bin" >> $GITHUB_PATH

    - name: Build .deb
      run: |
        export THEOS=/opt/theos
        make package FINALPACKAGE=1

    - name: Convert .deb to .tipa (TrollStore)
      run: |
        mkdir -p payload
        dpkg-deb -x packages/*.deb payload/
        APP_PATH=$(find payload -name "*.app" -type d | head -1)
        echo "Found App at: $APP_PATH"
        if [ -n "$APP_PATH" ]; then
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r HoangHaAimbot.tipa Payload
        else
          echo "Error: No .app found inside the package"
          exit 1
        fi

    - name: Upload TIPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: HoangHaAimbot-tipa
        path: HoangHaAimbot.tipa
